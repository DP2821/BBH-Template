<!DOCTYPE html>
<html>

<head>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport' />
    <meta charset="UTF-8">
    <meta name="description"
        content="Create personalized posters for Hanuman Jaynti 2024 by uploading your image and adding your name. Bhidbhanjan Hanuman Mandir Sakariya.">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.1/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropper/4.1.0/cropper.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="./Images/BBH Logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@600&display=swap" rel="stylesheet">

    <title>Make your Post for Hanuman Janmostav 2026</title>
</head>

<body>
    <div class="container">
        <div class="row" style="background-color: #ffffff;">
            <canvas id="canvas" width="960" height="1280" hidden></canvas>

            <form method="post" id="myform">
                <div class="col-lg-6 text-center">
                    <img src="./Images/Banner-2026.jpeg" alt="banner" class="mx-1">
                    <h4 class="mt-2 mb-3">તમારું પોસ્ટર બનાવો</h4>

                    <label id="display_image_div" style="max-height: 200px;">
                        <img name="display_image_data" id="display_image_data" src="./Images/person.png" alt="Picture"
                            width="100px" style="border-radius: 50%; background-color: lightgray; padding: 15px;">
                        <input type="file" name="browse_image" id="browse_image" class="form-control"
                            accept="image/png, image/gif, image/jpeg" style="display: none; ">
                    </label>

                    <input type="hidden" name="cropped_image_data" id="cropped_image_data">
                    <br>

                    <label onclick="start_cropping()" for="browse_image" class="btn btn-primary mt-1 border border-0"
                        style="background-color: #FF3434; padding: 5px;">તમારો ફોટો પસંદ કરો</label>

                    <input type="text" id="p_name" class="form-control mt-3" maxlength="15" required="required"
                        placeholder="તમારું નામ">

                    <input type="number" name="mobile" id="mobile" class="form-control mt-3" maxlength="10"
                        minlength="10" required="required" placeholder="તમારો મોબાઈલ નંબર" pattern="^[6-9]\d{9}$">

                    <button type="button" value="poster" class="btn btn-primary mt-3 w-100 border border-0"
                        style="background-color: #FF3434; margin-bottom: 2rem;" id="generateBtn">
                        <span class="spinner-border spinner-border-sm d-none" id="generateSpinner" role="status" aria-hidden="true"></span>
                        <span id="generateBtnText">પોસ્ટર બનાવો</span>
                    </button>
                    <a href="#" id="d-btn" class="btn btn-success d-none">Download Your Post</a>
                </div>
            </form>


            <div class="col-lg-6 d-none text-center" id="previewSection">
                <h4 class="mt-2 mb-3">Preview</h4>
                <div id="cropped_image_result" style="display: none;"></div>
                <img id="poster_preview" src="" class="img-fluid border shadow-sm mb-3" style="max-height: 500px;" alt="Poster Preview" />
                <button type="button" class="btn btn-success w-100" id="downloadFinalBtn" style="margin-bottom: 2rem;">
                    Download Poster
                </button>
            </div>
        </div><!--  end row -->
    </div><!-- end container -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.1/js/bootstrap.min.js"></script>
    <script src="./Scripts/cropper.min.js"></script>
    <script src="./Scripts/site.min.js"></script>
</body>

</html>
