<html>

<head>
    <title>Make your Post for Hanuman Jaynti 2024</title>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' name='viewport' />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.1/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropper/4.1.0/cropper.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="BBH Logo.jpg">

</head>

<body>
    <div class="container">
        <div class="row" style="background-color: #ffffff;">
            <canvas id="canvas" width="1920" height="1080" hidden></canvas>

            <form method="post" id="myform">
                <div class="col-lg-6 text-center">
                    <img src="BBH Banner.jpg" alt="banner" style="margin-top: 10px; margin-bottom: 10px;">
                    <h4 style="color: #000; margin-top: 10px; margin-bottom: 20px;">Create your Poster</h4>

                    <label id="display_image_div">
                        <img name="display_image_data" id="display_image_data" src="person.png" alt="Picture"
                            width="100px" style="border-radius: 50%; background-color: lightgray; padding: 15px;">
                        <input type="file" name="browse_image" id="browse_image" class="form-control"
                            accept="image/png, image/gif, image/jpeg" style="display: none; ">
                    </label>

                    <input type="hidden" name="cropped_image_data" id="cropped_image_data">
                    <br>

                    <label onclick="start_cropping()" style="font-weight: bold;" class="mt-1">Select Your Photo</label>

                    <input type="text" id="p_name" class="form-control mt-3" maxlength="20" required="required"
                        placeholder="Enter Your Name">

                    <input type="number" name="mobile" id="mobile" class="form-control mt-3" maxlength="10"
                        minlength="10" required="required" placeholder="Enter Mobile Number" pattern="^[6-9]\d{9}$">

                    <button type="button" value="poster" class="btn btn-primary mt-3 w-100 border border-0"
                        style="background-color: #FF3434;" id="downloadBtn">Create Poster</button>
                    <a href="#" id="d-btn" class="btn btn-success d-none">Download Your Post</a>
                </div>
            </form>


            <div class="col-lg-6 d-none text-center">
                <label>Preview</label>
                <div id="cropped_image_result">
                    <img style="width: 350px;" src="person.png" />
                </div>
                <br>
            </div>
        </div><!--  end row -->
    </div><!-- end container -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.1/js/bootstrap.min.js"></script>
    <script src="cropper.min.js"></script>
    <script>
        $("body").on("change", "#browse_image", function (e) {
            var files = e.target.files;
            var done = function (url) {
                $('#display_image_div').html('');
                $("#display_image_div").html('<img name="display_image_data" id="display_image_data" src="' + url + '" alt="Uploaded Picture">');

            };
            if (files && files.length > 0) {
                file = files[0];

                if (URL) {
                    done(URL.createObjectURL(file));
                } else if (FileReader) {
                    reader = new FileReader();
                    reader.onload = function (e) {
                        done(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            }

            var image = document.getElementById('display_image_data');
            var button = document.getElementById('crop_button');
            var result = document.getElementById('cropped_image_result');
            var croppable = false;

            var cropper = new Cropper(image, {
                aspectRatio: 1,
                viewMode: 0,
                dragMode: 'move',
                autoCropArea: 0.85,
                restore: false,
                guides: false,
                center: false,
                highlight: false,
                cropBoxMovable: false,
                cropBoxResizable: false,
                toggleDragModeOnDblclick: false,
                ready: function () {
                    croppable = true;

                },
            });

            $('#downloadBtn').click(function () {
                // Crop
                croppedCanvas = cropper.getCroppedCanvas();

                // Round
                roundedCanvas = getRoundedCanvas(croppedCanvas);

                // Show
                roundedImage = document.createElement('img');

                roundedImage.src = roundedCanvas.toDataURL()
                result.innerHTML = '';
                result.appendChild(roundedImage);

                // Get the canvas
                var canvas = document.getElementById('canvas');
                var ctx = canvas.getContext('2d');

                // Draw the main image
                var mainImage = new Image();
                mainImage.src = 'BBH Banner Main.jpg';
                mainImage.onload = function () {
                    ctx.drawImage(mainImage, 0, 0, canvas.width, canvas.height);

                    // Draw the second image (cropped image) at a specific position
                    var secondImage = new Image();
                    secondImage.src = $('#cropped_image_data').val(); // Getting the cropped image data
                    secondImage.src = $('#cropped_image_result img').attr('src')
                    secondImage.onload = function () {
                        ctx.drawImage(secondImage, 1412, 0, 500, 500); // Adjust position and size as needed

                        // To Write Text on Image
                        var ctxText = canvas.getContext('2d');
                        ctxText.font = '40px Arial'; // Set font size and type
                        ctxText.fillStyle = '#FF3434'; // Set text color
                        ctxText.textAlign = 'center'; // Set text alignment
                        ctxText.fillText($('#p_name').val(), canvas.width - 350, canvas.height - 25); // Set position of text

                        // Convert canvas content to a data URL
                        var dataURL = canvas.toDataURL('image/png');

                        // Create a link element for downloading
                        var downloadLink = document.createElement('a');
                        downloadLink.download = 'final_image.png'; // Set filename for downloaded image
                        downloadLink.href = dataURL;

                        // Trigger download
                        document.body.appendChild(downloadLink);
                        downloadLink.click();
                        document.body.removeChild(downloadLink);
                    };
                };

                InsertExpense();
            });
        });

        function getRoundedCanvas(sourceCanvas) {
            var canvas = document.createElement('canvas');
            var context = canvas.getContext('2d');
            var width = sourceCanvas.width;
            var height = sourceCanvas.height;

            var width = 720;
            var height = 720;

            canvas.width = width;
            canvas.height = height;
            context.imageSmoothingEnabled = true;
            context.drawImage(sourceCanvas, 0, 0, width, height);
            context.globalCompositeOperation = 'destination-in';
            context.beginPath();
            context.arc(width / 2, height / 2, Math.min(width, height) / 2, 0, 2 * Math.PI, true);
            context.fill();
            return canvas;
        }

        $('#d-btn').click(function (e) {
            e.preventDefault();  //stop the browser from following

            var $url = $(this).attr('href');

            var link = document.createElement('a');
            document.body.appendChild(link);
            link.download = '';
            link.href = $url;
            link.click();

            var is_iphone = iOS();

            if (!is_iphone) {
                window.location.href = window.location.href;
            }
        });

        function iOS() {
            return [
                'iPad Simulator',
                'iPhone Simulator',
                'iPod Simulator',
                'iPad',
                'iPhone',
                'iPod'
            ].includes(navigator.platform)
                // iPad on iOS 13 detection
                || (navigator.userAgent.includes("Mac") && "ontouchend" in document)
        }

        function InsertExpense() {

            var URL_Main = 'https://script.google.com/macros/s/AKfycbw3Gu_ZsQHwEq20C2Cq-j1CN1U-_kH3EdcB3Tty9UdpnErmvfTyhpW0gTle3Fm9P6AxyA/exec';

            var name = $("#p_name").val();
            var mobile = $("#mobile").val();

            $.ajax({
                url: URL_Main,
                type: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                data:
                {
                    name: name,
                    mobile: mobile
                },
                success: function (data) { },
                error: function (xhr, status, error) { }
            });
        }
    </script>
</body>

</html>
